name: Deploy

on:
  push:
    branches: [master]

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer

      - name: Install Composer dependencies
        run: composer install --no-dev --no-interaction --prefer-dist --optimize-autoloader

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies & build assets
        run: |
          npm ci
          npm run build

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          printf '%s\n' "${{ secrets.SSH_KNOWN_HOSTS }}" >> ~/.ssh/known_hosts

      - name: Pull & deploy on server
        run: |
          ssh -i ~/.ssh/deploy_key \
              -p ${{ secrets.SSH_PORT }} \
              ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
              'cd /home2/srojasap/hub &&
               git pull origin master &&
               composer install --no-dev --optimize-autoloader --no-interaction &&
               php artisan migrate --force &&
               php artisan optimize &&
               php artisan view:clear'

      - name: Sync built assets
        run: |
          tar -czf - -C public/build . | \
            ssh -i ~/.ssh/deploy_key \
                -p ${{ secrets.SSH_PORT }} \
                -o StrictHostKeyChecking=no \
                ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
                'mkdir -p /home2/srojasap/hub/public/build && tar -xzf - -C /home2/srojasap/hub/public/build'
